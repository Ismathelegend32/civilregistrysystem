<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil Registration System - Login (Local Version)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>

<body class="flex items-center justify-center p-4 min-h-screen">
    <div class="login-card w-full max-w-md rounded-2xl p-6 md:p-8">
        <div class="text-center mb-4">
            <div class="inline-block p-3 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full mb-3">
                <i class="fas fa-landmark text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-1">Civil Registration System</h1>
            <p class="text-gray-600 text-sm">Local Frontend-Only Version</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="fas fa-user mr-2"></i>Username
                </label>
                <input type="text" id="username" required
                    class="input-field w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none"
                    placeholder="username">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    <i class="fas fa-lock mr-2"></i>Password
                </label>
                <input type="password" id="password" required
                    class="input-field w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none"
                    placeholder="password">
            </div>
            <div id="errorMessage"
                class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded-lg text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText"></span>
            </div>
            <button type="submit" class="btn-login w-full text-white font-semibold py-2.5 rounded-lg active:scale-95">
                <i class="fas fa-sign-in-alt mr-2"></i>Login
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-4 text-center text-sm text-gray-600 flex flex-row items-center justify-center">
            <p class="mr-2">Generated by</p>
            <img src="logo.png" alt="Generated By Logo" class="h-20 object-contain">
        </div>
    </div>


    <script src="main.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const res = await apiRequest('auth', 'POST', { username, password });
            if (res.success) {
                window.location.href = 'dashboard.html';
            } else {
                const errorText = document.getElementById('errorText');
                const errorMessage = document.getElementById('errorMessage');
                errorText.textContent = res.message;
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
