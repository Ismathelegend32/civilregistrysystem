<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Civil Registration (Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50" data-page="reports">
    <aside id="sidebar" class="sidebar fixed left-0 top-0 h-full w-64 bg-gradient-to-b from-blue-900 to-purple-900 text-white shadow-2xl transition-all duration-300">
        <div class="sidebar-inner p-6">
            <div class="flex items-center space-x-3 mb-6 shrink-0">
                <div class="p-2 bg-white bg-opacity-20 rounded-lg"><i class="fas fa-landmark text-2xl"></i></div>
                <div class="logo-text"><h2 class="text-xl font-bold">Civil Registry</h2><p class="text-xs text-blue-200">Local Version</p></div>
            </div>
            <nav class="space-y-2"></nav>
            <div class="sidebar-footer">
                <div class="flex items-center space-x-3 bg-white bg-opacity-10 p-3 rounded-lg border border-white border-opacity-10">
                    <span class="text-xs text-blue-200">Generated by</span>
                    <img src="footer-logo.png" class="h-10 object-contain" onerror="this.style.display='none'">
                </div>
            </div>
        </div>
    </aside>
    <div id="mainContent" class="ml-64 transition-all duration-300">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="flex items-center justify-between px-4 md:px-6 py-4">
                <div class="flex items-center space-x-3"><button id="toggleSidebar" class="text-gray-600"><i class="fas fa-bars text-xl"></i></button><h1 class="text-xl font-bold gradient-text">Reports</h1></div>
                <img id="userAvatar" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-md">
            </div>
        </header>
        <main class="p-4 md:p-6 w-full max-w-full overflow-x-hidden">
            <div class="reports-panel bg-white rounded-2xl shadow-lg p-4 sm:p-6">
                <form id="reportForm" class="space-y-5">
                    <div class="report-field"><label class="block text-sm font-medium mb-2">Report Type</label>
                        <select id="reportType" class="w-full px-4 py-3 border rounded-xl"><option value="all">All Registrations</option><option value="birth">Birth Only</option><option value="death">Death Only</option></select></div>
                    <div class="report-field"><label class="block text-sm font-medium mb-2">Date Range</label>
                        <div class="report-date-range flex flex-col sm:flex-row gap-3"><input type="date" id="dateFrom" class="w-full min-w-0 flex-1 px-4 py-3 border rounded-xl"><span class="text-center text-gray-500 text-sm">to</span><input type="date" id="dateTo" class="w-full min-w-0 flex-1 px-4 py-3 border rounded-xl"></div></div>
                    <div class="report-field"><label class="block text-sm font-medium mb-2">Gender</label>
                        <select id="genderFilter" class="w-full px-4 py-3 border rounded-xl"><option value="all">All</option><option value="Male">Male</option><option value="Female">Female</option></select></div>
                    <button type="submit" class="w-full py-3.5 bg-blue-600 text-white rounded-xl font-semibold"><i class="fas fa-search mr-2"></i>Generate Report</button>
                </form>
                <div id="reportResults" class="hidden mt-6 pt-6 border-t">
                    <p class="text-sm mb-4"><strong id="reportCount">0</strong> records — <button type="button" onclick="window.print()" class="no-print text-blue-600 text-sm"><i class="fas fa-print"></i> Print</button></p>
                    <table class="w-full responsive-table"><thead class="bg-gray-50"><tr><th class="px-3 py-2 text-xs uppercase text-left">Type</th><th class="px-3 py-2 text-xs">Name</th><th class="px-3 py-2 text-xs">Gender</th><th class="px-3 py-2 text-xs">Date</th><th class="px-3 py-2 text-xs">Details</th><th class="px-3 py-2 text-xs">Cert</th></tr></thead><tbody id="reportTableBody"></tbody></table>
                </div>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
    <script src="reports.js"></script>
    <script>checkAuth().then(() => { crsLoadReportData(); crsInitReportsForm(); });</script>
</body>
</html>
