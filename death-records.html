<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death Records - Civil Registration System (Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50" data-page="death-records">
    <aside id="sidebar" class="sidebar fixed left-0 top-0 h-full w-64 bg-gradient-to-b from-blue-900 to-purple-900 text-white shadow-2xl transition-all duration-300">
        <div class="sidebar-inner p-6">
            <div class="flex items-center space-x-3 mb-6 shrink-0">
                <div class="p-2 bg-white bg-opacity-20 rounded-lg"><i class="fas fa-landmark text-2xl"></i></div>
                <div class="logo-text"><h2 class="text-xl font-bold">Civil Registry</h2><p class="text-xs text-blue-200">Local Version</p></div>
            </div>
            <nav class="space-y-2"></nav>
            <div class="sidebar-footer">
                <div class="flex items-center space-x-3 bg-white bg-opacity-10 p-3 rounded-lg border border-white border-opacity-10">
                    <span class="text-xs text-blue-200">Generated by</span>
                    <img src="footer-logo.png" alt="Logo" class="h-10 object-contain" onerror="this.style.display='none'">
                </div>
            </div>
        </div>
    </aside>

    <div id="mainContent" class="ml-64 transition-all duration-300">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="flex items-center justify-between px-6 py-4">
                <div class="flex items-center space-x-4">
                    <button id="toggleSidebar" class="text-gray-600 focus:outline-none"><i
                            class="fas fa-bars text-xl"></i></button>
                    <h1 class="text-2xl font-bold gradient-text">Death Records</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="relative group">
                        <button class="flex items-center space-x-3 focus:outline-none">
                            <img id="userAvatar" src="https://ui-avatars.com/api/?name=User"
                                class="w-10 h-10 rounded-full border-2 border-white shadow-md">
                            <div class="hidden md:block text-left">
                                <p id="userName" class="text-sm font-semibold text-gray-800">User</p>
                                <p id="userRole" class="text-xs text-gray-500">Role</p>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="p-6">
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 space-y-4 md:space-y-0">
                    <div class="flex items-center space-x-3">
                        <div class="p-3 bg-purple-100 rounded-lg"><i class="fas fa-list text-purple-600 text-2xl"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800">Death Registrations</h2>
                            <p class="text-gray-600 text-sm">View and manage death records</p>
                        </div>
                    </div>
                    <div class="mb-6 flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4 w-full md:w-auto">
                        <div class="relative flex-grow">
                            <i
                                class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="searchInput" placeholder="Search by name or cause of death..."
                                class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all">
                        </div>
                        <button onclick="performSearch()"
                            class="px-8 py-3 bg-purple-600 text-white rounded-xl shadow-md hover:bg-purple-700 transition-all font-bold">
                            Search
                        </button>
                        <button type="button" onclick="window.print()"
                            class="px-6 py-3 bg-gray-100 text-gray-800 rounded-xl font-bold hover:bg-gray-200 transition-all">
                            <i class="fas fa-print mr-2"></i>Print
                        </button>
                        <a href="death-registration.html"
                            class="px-6 py-3 bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center font-bold">
                            <i class="fas fa-plus mr-2"></i>Register Death</a>
                    </div>
                </div>

                <div class="overflow-x-auto mt-6 -mx-2 md:mx-0">
                    <table class="w-full responsive-table">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs text-gray-500 uppercase">ID</th>
                                <th class="px-6 py-3 text-left text-xs text-gray-500 uppercase">Name</th>
                                <th class="px-6 py-3 text-left text-xs text-gray-500 uppercase">DOD</th>
                                <th class="px-6 py-3 text-left text-xs text-gray-500 uppercase">Cause</th>
                                <th class="px-6 py-3 text-left text-xs text-gray-500 uppercase">Registered By</th>
                                <th class="px-6 py-3 text-left text-xs text-gray-500 uppercase">Reg Date</th>
                                <th class="px-6 py-3 text-left text-xs text-gray-500 uppercase">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTableBody" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
    <script>
        let allRecords = [];
        checkAuth().then(() => loadRecords());

        async function loadRecords() {
            try {
                const res = await apiRequest('death?action=list');
                if (res.success) {
                    allRecords = res.data;
                    displayRecords(allRecords);
                }
            } catch (error) { console.error(error); }
        }

        function displayRecords(records) {
            const tbody = document.getElementById('recordsTableBody');
            const labels = ['ID', 'Name', 'DOD', 'Cause', 'Registered By', 'Reg Date', 'Actions'];
            tbody.innerHTML = records.map(r => `
                <tr class="hover:bg-gray-50 transition-all">
                    <td data-label="${labels[0]}" class="px-6 py-4 text-sm text-gray-500">#${r.id}</td>
                    <td data-label="${labels[1]}" class="px-6 py-4 text-sm font-medium text-gray-900">${r.full_name}</td>
                    <td data-label="${labels[2]}" class="px-6 py-4 text-sm text-gray-600">${r.date_of_death}</td>
                    <td data-label="${labels[3]}" class="px-6 py-4 text-sm text-gray-600 font-medium">${r.cause_of_death}</td>
                    <td data-label="${labels[4]}" class="px-6 py-4 text-sm text-gray-600 font-semibold">${r.registered_by_username}</td>
                    <td data-label="${labels[5]}" class="px-6 py-4 text-sm text-gray-500">${new Date(r.created_at).toLocaleDateString()}</td>
                    <td data-label="${labels[6]}" class="px-6 py-4 text-sm">
                        <div class="flex space-x-2">
                            <a href="death-registration.html?id=${r.id}" class="text-purple-600 hover:text-purple-800 p-2 hover:bg-purple-50 rounded-lg"><i class="fas fa-edit"></i></a>
                            <button onclick="deleteRow(${r.id})" class="text-red-600 hover:text-red-800 p-2 hover:bg-red-50 rounded-lg"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            performSearch();
        });

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = allRecords.filter(r =>
                r.full_name.toLowerCase().includes(query) ||
                r.cause_of_death.toLowerCase().includes(query)
            );
            displayRecords(filtered);
        }

        async function deleteRow(id) {
            if (confirm('Are you sure you want to delete this record?')) {
                const res = await apiRequest(`death?action=delete&id=${id}`, 'POST');
                if (res.success) { showNotification('Record deleted'); loadRecords(); }
            }
        }
    </script>


</body>

</html>
