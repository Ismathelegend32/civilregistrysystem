<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Civil Registration System (Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-50">
    <!-- ... sidebar remains same ... -->
    <aside id="sidebar"
        class="sidebar fixed left-0 top-0 h-full w-64 bg-gradient-to-b from-blue-900 to-purple-900 text-white z-50 shadow-2xl transition-all duration-300">
        <div class="p-6">
            <div class="flex items-center space-x-3 mb-8">
                <div class="p-2 bg-white bg-opacity-20 rounded-lg"><i class="fas fa-landmark text-2xl"></i></div>
                <div class="logo-text">
                    <h2 class="text-xl font-bold">Civil Registry</h2>
                    <p class="text-xs text-blue-200">Local Version</p>
                </div>
            </div>
            <nav class="space-y-2">
                <a href="dashboard.html" class="menu-item active flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <i class="fas fa-chart-line text-lg w-6"></i><span class="menu-text">Dashboard</span></a>
                <a href="birth-registration.html" class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <i class="fas fa-baby text-lg w-6"></i><span class="menu-text">Birth Registration</span></a>
                <a href="death-registration.html" class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <i class="fas fa-book-dead text-lg w-6"></i><span class="menu-text">Death Registration</span></a>
                <a href="users.html" class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <i class="fas fa-users text-lg w-6"></i><span class="menu-text">Users</span></a>
                <a href="#" onclick="logout()"
                    class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg mt-8 bg-red-600 bg-opacity-20 hover:bg-opacity-30"><i
                        class="fas fa-sign-out-alt text-lg w-6"></i><span class="menu-text">Logout</span></a>
            </nav>
            <div class="absolute bottom-6 left-0 w-full px-6">
                <div
                    class="flex items-center space-x-3 bg-white bg-opacity-10 p-3 rounded-lg backdrop-blur-sm border border-white border-opacity-10">
                    <span class="text-xs text-blue-200">Generated by</span>
                    <img src="footer-logo.png" alt="Logo" class="h-10 object-contain">
                </div>
            </div>
        </div>
    </aside>

    <div id="mainContent" class="ml-64 transition-all duration-300">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="flex items-center justify-between px-6 py-4">
                <div class="flex items-center space-x-4">
                    <button id="toggleSidebar" class="text-gray-600"><i class="fas fa-bars text-xl"></i></button>
                    <h1 class="text-2xl font-bold gradient-text">Dashboard</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="relative group">
                        <button class="flex items-center space-x-3">
                            <img id="userAvatar" src="https://ui-avatars.com/api/?name=User"
                                class="w-10 h-10 rounded-full border-2 border-white shadow-md">
                            <div class="hidden md:block text-left">
                                <p id="userName" class="text-sm font-semibold text-gray-800">User</p>
                                <p id="userRole" class="text-xs text-gray-500">Role</p>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <a href="birth-records.html"
                    class="stat-card bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl p-6 text-white shadow-lg">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-blue-100 text-sm">Total Births</p>
                            <h3 class="text-4xl font-bold" id="totalBirths">0</h3>
                        </div>
                        <i class="fas fa-baby text-4xl bg-white bg-opacity-20 p-4 rounded-full"></i>
                    </div>
                </a>
                <a href="death-records.html"
                    class="stat-card bg-gradient-to-br from-purple-500 to-purple-600 rounded-2xl p-6 text-white shadow-lg">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-purple-100 text-sm">Total Deaths</p>
                            <h3 class="text-4xl font-bold" id="totalDeaths">0</h3>
                        </div>
                        <i class="fas fa-book-dead text-4xl bg-white bg-opacity-20 p-4 rounded-full"></i>
                    </div>
                </a>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Birth Stats -->
                <div class="bg-white p-6 rounded-2xl shadow-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800">Birth Stats</h3>
                        <select id="birthChartType" class="text-xs border rounded p-1">
                            <option value="monthly">Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>
                    <canvas id="birthChart"></canvas>
                </div>
                <!-- Death Stats -->
                <div class="bg-white p-6 rounded-2xl shadow-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800">Death Stats</h3>
                        <select id="deathChartType" class="text-xs border rounded p-1">
                            <option value="monthly">Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>
                    <canvas id="deathChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
    <script>
        checkAuth();
        let birthChart, deathChart;
        let dashboardData = null;

        loadDashboardData();

        async function loadDashboardData() {
            try {
                const res = await apiRequest('dashboard');
                if (res.success) {
                    dashboardData = res.data;
                    document.getElementById('totalBirths').textContent = res.data.totalBirths;
                    document.getElementById('totalDeaths').textContent = res.data.totalDeaths;
                    initCharts();
                }
            } catch (error) { console.error(error); }
        }

        function initCharts() {
            const chartOptions = {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
                animation: { duration: 1000, easing: 'easeInOutQuart' }
            };

            const ctxBirth = document.getElementById('birthChart').getContext('2d');
            birthChart = new Chart(ctxBirth, {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                    datasets: [{
                        label: 'Births',
                        data: formatMonthlyData(dashboardData.birthStats.monthly),
                        backgroundColor: 'rgba(59, 130, 246, 0.8)',
                        borderColor: 'rgba(59, 130, 246, 1)',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: chartOptions
            });

            const ctxDeath = document.getElementById('deathChart').getContext('2d');
            deathChart = new Chart(ctxDeath, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                    datasets: [{
                        label: 'Deaths',
                        data: formatMonthlyData(dashboardData.deathStats.monthly),
                        backgroundColor: 'rgba(168, 85, 247, 0.2)',
                        borderColor: 'rgba(168, 85, 247, 1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: chartOptions
            });

            document.getElementById('birthChartType').addEventListener('change', e => updateChart(birthChart, dashboardData.birthStats, e.target.value));
            document.getElementById('deathChartType').addEventListener('change', e => updateChart(deathChart, dashboardData.deathStats, e.target.value));
        }

        function formatMonthlyData(monthlyStats) {
            const data = new Array(12).fill(0);
            monthlyStats.forEach(item => { data[item.month - 1] = item.count; });
            return data;
        }

        function updateChart(chart, stats, type) {
            if (type === 'monthly') {
                chart.data.labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                chart.data.datasets[0].data = formatMonthlyData(stats.monthly);
            } else {
                chart.data.labels = stats.yearly.map(y => y.year);
                chart.data.datasets[0].data = stats.yearly.map(y => y.count);
            }
            chart.update();
        }
    </script>


</body>

</html>
