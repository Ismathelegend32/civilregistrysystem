<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death Registration - Civil Registration System (Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50" data-page="death-registration">
    <aside id="sidebar" class="sidebar fixed left-0 top-0 h-full w-64 bg-gradient-to-b from-blue-900 to-purple-900 text-white shadow-2xl transition-all duration-300">
        <div class="sidebar-inner p-6">
            <div class="flex items-center space-x-3 mb-6 shrink-0">
                <div class="p-2 bg-white bg-opacity-20 rounded-lg"><i class="fas fa-landmark text-2xl"></i></div>
                <div class="logo-text"><h2 class="text-xl font-bold">Civil Registry</h2><p class="text-xs text-blue-200">Local Version</p></div>
            </div>
            <nav class="space-y-2"></nav>
            <div class="sidebar-footer">
                <div class="flex items-center space-x-3 bg-white bg-opacity-10 p-3 rounded-lg border border-white border-opacity-10">
                    <span class="text-xs text-blue-200">Generated by</span>
                    <img src="footer-logo.png" alt="Logo" class="h-10 object-contain" onerror="this.style.display='none'">
                </div>
            </div>
        </div>
    </aside>

    <div id="mainContent" class="ml-64 transition-all duration-300">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="flex items-center justify-between px-6 py-4">
                <div class="flex items-center space-x-4">
                    <button id="toggleSidebar" class="text-gray-600 focus:outline-none"><i
                            class="fas fa-bars text-xl"></i></button>
                    <h1 class="text-2xl font-bold gradient-text" id="pageTitle">Death Registration</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="relative group">
                        <button class="flex items-center space-x-3 focus:outline-none">
                            <img id="userAvatar" src="https://ui-avatars.com/api/?name=User"
                                class="w-10 h-10 rounded-full border-2 border-white shadow-md">
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="p-6">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white rounded-2xl shadow-lg p-8">
                    <form id="deathForm" class="space-y-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">Deceased Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="md:col-span-2"><label class="block text-sm font-medium text-gray-700 mb-2">Full
                                    Name *</label><input type="text" id="full_name" required
                                    class="w-full px-4 py-3 border rounded-lg"></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-2">Date of Death
                                    *</label><input type="date" id="date_of_death" required
                                    class="w-full px-4 py-3 border rounded-lg"></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-2">Age at Death
                                    *</label><input type="number" id="age_at_death" required
                                    class="w-full px-4 py-3 border rounded-lg"></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-2">Gender *</label><select
                                    id="gender" required class="w-full px-4 py-3 border rounded-lg">
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select></div>
                            <div class="md:col-span-2"><label class="block text-sm font-medium text-gray-700 mb-2">Place
                                    of Death *</label><input type="text" id="place_of_death" required
                                    class="w-full px-4 py-3 border rounded-lg"></div>
                            <div class="md:col-span-2"><label class="block text-sm font-medium text-gray-700 mb-2">Cause
                                    of Death *</label><textarea id="cause_of_death" required
                                    class="w-full px-4 py-3 border rounded-lg"></textarea></div>
                        </div>
                        <div class="flex justify-end space-x-4 pt-6">
                            <a href="dashboard.html" class="px-6 py-3 border rounded-lg">Cancel</a>
                            <button type="submit"
                                class="px-6 py-3 bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg font-bold">Save
                                Registration</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
    <script>
        checkAuth();
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id');
        if (editId) loadData();

        async function loadData() {
            const res = await apiRequest(`death?action=get&id=${editId}`);
            if (res.success) {
                const d = res.data;
                ['full_name', 'date_of_death', 'age_at_death', 'gender', 'place_of_death', 'cause_of_death'].forEach(f => {
                    document.getElementById(f).value = d[f];
                });
            }
        }

        document.getElementById('deathForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                full_name: document.getElementById('full_name').value,
                date_of_death: document.getElementById('date_of_death').value,
                age_at_death: document.getElementById('age_at_death').value,
                gender: document.getElementById('gender').value,
                place_of_death: document.getElementById('place_of_death').value,
                cause_of_death: document.getElementById('cause_of_death').value
            };
            if (editId) data.id = editId;
            const res = await apiRequest(`death?action=${editId ? 'update' : 'register'}`, 'POST', data);
            if (res.success) { showNotification('Success'); setTimeout(() => window.location.href = 'death-records.html', 1000); }
        });
    </script>
</body>

</html>
