<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Civil Registration System (Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50">
    <aside id="sidebar"
        class="sidebar fixed left-0 top-0 h-full w-64 bg-gradient-to-b from-blue-900 to-purple-900 text-white z-50 transition-all duration-300">
        <div class="p-6">
            <div class="flex items-center space-x-3 mb-8">
                <div class="p-2 bg-white bg-opacity-20 rounded-lg"><i class="fas fa-landmark text-2xl"></i></div>
                <div class="logo-text">
                    <h2 class="text-xl font-bold">Civil Registry</h2>
                </div>
            </div>
            <nav class="space-y-2">
                <a href="dashboard.html" class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg"><i
                        class="fas fa-chart-line text-lg w-6"></i><span class="menu-text">Dashboard</span></a>
                <a href="birth-registration.html" class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg"><i
                        class="fas fa-baby text-lg w-6"></i><span class="menu-text">Birth Registration</span></a>
                <a href="death-registration.html" class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg"><i
                        class="fas fa-book-dead text-lg w-6"></i><span class="menu-text">Death Registration</span></a>
                <a href="users.html" class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg"><i
                        class="fas fa-users text-lg w-6"></i><span class="menu-text">Users</span></a>
                <a href="#" onclick="logout()"
                    class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg mt-8 bg-red-600 bg-opacity-20"><i
                        class="fas fa-sign-out-alt text-lg w-6"></i><span class="menu-text">Logout</span></a>
            </nav>
        </div>
    </aside>

    <div id="mainContent" class="ml-64 transition-all duration-300">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="flex items-center justify-between px-4 md:px-6 py-4">
                <div class="flex items-center space-x-4">
                    <button id="toggleSidebar" class="text-gray-600 focus:outline-none"><i class="fas fa-bars text-xl"></i></button>
                    <h1 class="text-xl md:text-2xl font-bold gradient-text">User Profile</h1>
                </div>
                <a href="dashboard.html" class="text-blue-600 font-bold text-sm md:text-base">Dashboard</a>
            </div>
        </header>

        <main class="p-6">
            <div class="bg-white rounded-2xl shadow-lg p-8 max-w-2xl mx-auto">
                <div class="flex flex-col items-center mb-8">
                    <img id="profilePic" src=""
                        class="w-32 h-32 rounded-full border-4 border-blue-100 shadow-xl mb-4 bg-gray-50">
                    <h2 id="fullNameDisplay" class="text-2xl font-bold text-gray-800">User Name</h2>
                    <p id="roleDisplay" class="text-blue-600 font-medium uppercase text-sm">Role</p>
                    <div class="mt-8 border-t pt-8">
                        <h3 class="text-lg font-bold text-gray-800 mb-4">System Settings (Local)</h3>
                        <div class="bg-red-50 p-4 rounded-xl border border-red-100">
                            <p class="text-sm text-red-600 mb-4 font-medium">Resetting data will clear all records and
                                recreate the 90 birth and 30 death mock records from the latest script version.</p>
                            <button onclick="resetData()"
                                class="w-full py-3 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 transition-all shadow-md">
                                <i class="fas fa-trash-alt mr-2"></i>Reset System Data
                            </button>
                        </div>
                    </div>
                </div>
        </main>
    </div>

    <script src="main.js"></script>
    <script>
        checkAuth().then(user => {
            if (user) {
                document.getElementById('fullNameDisplay').textContent = user.full_name;
                document.getElementById('roleDisplay').textContent = user.role;
                document.getElementById('profilePic').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.full_name)}&background=random&size=128`;
            }
        });

        function resetData() {
            if (confirm('Are you sure you want to reset all data? This will clear all records and reload the page.')) {
                localStorage.removeItem('crs_births');
                localStorage.removeItem('crs_deaths');
                // Optional: clear users if needed, but keeping current user logged in is better
                location.reload();
            }
        }
    </script>

</body>

</html>
