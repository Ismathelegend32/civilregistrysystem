<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Civil Registration System (Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50" data-page="profile">
    <aside id="sidebar" class="sidebar fixed left-0 top-0 h-full w-64 bg-gradient-to-b from-blue-900 to-purple-900 text-white shadow-2xl transition-all duration-300">
        <div class="sidebar-inner p-6">
            <div class="flex items-center space-x-3 mb-6 shrink-0">
                <div class="p-2 bg-white bg-opacity-20 rounded-lg"><i class="fas fa-landmark text-2xl"></i></div>
                <div class="logo-text"><h2 class="text-xl font-bold">Civil Registry</h2><p class="text-xs text-blue-200">Local Version</p></div>
            </div>
            <nav class="space-y-2"></nav>
            <div class="sidebar-footer">
                <div class="flex items-center space-x-3 bg-white bg-opacity-10 p-3 rounded-lg border border-white border-opacity-10">
                    <span class="text-xs text-blue-200">Generated by</span>
                    <img src="footer-logo.png" alt="Logo" class="h-10 object-contain" onerror="this.style.display='none'">
                </div>
            </div>
        </div>
    </aside>
    <div id="mainContent" class="ml-64 transition-all duration-300">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="flex items-center justify-between px-4 md:px-6 py-4">
                <div class="flex items-center space-x-4">
                    <button id="toggleSidebar" class="text-gray-600"><i class="fas fa-bars text-xl"></i></button>
                    <h1 class="text-xl md:text-2xl font-bold gradient-text">My Profile</h1>
                </div>
                <a href="profile.html"><img id="userAvatar" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-md object-cover"></a>
            </div>
        </header>
        <main class="p-4 md:p-6">
            <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8 max-w-2xl mx-auto">
                <div class="flex flex-col items-center mb-8">
                    <div class="relative mb-4">
                        <img id="profilePic" src="" class="w-32 h-32 rounded-full border-4 border-blue-100 shadow-xl object-cover bg-gray-100">
                        <label for="profile_pic" class="absolute bottom-0 right-0 bg-blue-600 text-white p-2 rounded-full cursor-pointer hover:bg-blue-700">
                            <i class="fas fa-camera"></i>
                        </label>
                        <input type="file" id="profile_pic" accept="image/*" class="hidden">
                    </div>
                    <h2 id="fullNameDisplay" class="text-2xl font-bold text-gray-800">User</h2>
                    <p id="roleDisplay" class="text-blue-600 text-sm uppercase font-medium">Role</p>
                </div>
                <form id="profileForm" class="space-y-4">
                    <input type="hidden" id="userId">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="full_name" required class="w-full px-4 py-3 border rounded-xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" required class="w-full px-4 py-3 border rounded-xl">
                    </div>
                    <button type="submit" class="w-full py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700">Save Profile</button>
                </form>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
    <script>
        let pendingPicUrl = null;
        checkAuth().then(user => {
            if (!user) return;
            document.getElementById('userId').value = user.id;
            document.getElementById('full_name').value = user.full_name;
            document.getElementById('email').value = user.email || '';
            document.getElementById('fullNameDisplay').textContent = user.full_name;
            document.getElementById('roleDisplay').textContent = user.role;
            applyAvatarToPage(user.profile_pic, user.full_name);
        });
        document.getElementById('profile_pic').addEventListener('change', async function () {
            if (!this.files[0]) return;
            try {
                showNotification('Saving photo...');
                pendingPicUrl = await uploadProfileImageToCloudinary(this.files[0]);
                applyAvatarToPage(pendingPicUrl, document.getElementById('full_name').value);
                showNotification('Photo ready — click Save Profile');
            } catch (e) {
                showNotification(e.message, 'error');
            }
        });
        document.getElementById('profileForm').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const payload = {
                id: parseInt(id, 10),
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                username: window.currentUser.username
            };
            if (pendingPicUrl) payload.profile_pic = pendingPicUrl;
            const res = await apiRequest('users?action=update', 'POST', payload);
            if (res.success) {
                showNotification('Profile saved');
                pendingPicUrl = null;
            } else showNotification(res.message || 'Failed', 'error');
        });
    </script>
</body>
</html>
