<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death Certificate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>@media print { .no-print { display: none !important; } } .cert-border { border: 4px double #6b21a8; }</style>
</head>
<body class="bg-gray-100 p-6">
    <div class="no-print mb-4 flex gap-3"><button onclick="window.print()" class="px-6 py-2 bg-purple-600 text-white rounded-lg">Print</button><button onclick="window.close()" class="px-6 py-2 bg-gray-200 rounded-lg">Close</button></div>
    <div id="certContent" class="max-w-3xl mx-auto bg-white cert-border rounded-lg p-10 shadow-xl">Loading...</div>
    <script src="main.js"></script>
    <script>
        (async () => {
            const id = new URLSearchParams(location.search).get('id');
            const res = await apiRequest(`death?action=get&id=${id}`);
            if (!res.success) { document.getElementById('certContent').innerHTML = '<p class="text-red-600">Not found</p>'; return; }
            const r = res.data;
            document.getElementById('certContent').innerHTML = `
                <div class="text-center mb-6"><i class="fas fa-landmark text-4xl text-purple-700"></i><h1 class="text-2xl font-bold text-purple-900 mt-2">DEATH CERTIFICATE</h1><p class="text-sm text-gray-500">No: DTH-${String(r.id).padStart(6,'0')}</p></div>
                <p class="mb-4 text-gray-700">Certified registration of death:</p>
                <p class="mb-2"><strong>Name:</strong> ${r.full_name}</p>
                <p class="mb-2"><strong>Date of Death:</strong> ${r.date_of_death}</p>
                <p class="mb-2"><strong>Gender:</strong> ${r.gender}</p>
                <p class="mb-2"><strong>Cause:</strong> ${r.cause_of_death}</p>
                <p class="mb-2"><strong>Place:</strong> ${r.place_of_death || '—'}</p>`;
        })();
    </script>
</body>
</html>
