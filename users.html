<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management - Civil Registration System (Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50">
    <aside id="sidebar"
        class="sidebar fixed left-0 top-0 h-full w-64 bg-gradient-to-b from-blue-900 to-purple-900 text-white z-50 transition-all duration-300">
        <div class="p-6">
            <div class="flex items-center space-x-3 mb-8">
                <div class="p-2 bg-white bg-opacity-20 rounded-lg"><i class="fas fa-landmark text-2xl"></i></div>
                <div class="logo-text">
                    <h2 class="text-xl font-bold">Civil Registry</h2>
                    <p class="text-xs text-blue-200">Local Version</p>
                </div>
            </div>
            <nav class="space-y-2">
                <a href="dashboard.html" class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg"><i
                        class="fas fa-chart-line text-lg w-6"></i><span class="menu-text">Dashboard</span></a>
                <a href="birth-registration.html" class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg"><i
                        class="fas fa-baby text-lg w-6"></i><span class="menu-text">Birth Registration</span></a>
                <a href="death-registration.html" class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg"><i
                        class="fas fa-book-dead text-lg w-6"></i><span class="menu-text">Death Registration</span></a>
                <a href="users.html" class="menu-item active flex items-center space-x-3 px-4 py-3 rounded-lg"><i
                        class="fas fa-users text-lg w-6"></i><span class="menu-text">Users</span></a>
                <a href="#" onclick="logout()"
                    class="menu-item flex items-center space-x-3 px-4 py-3 rounded-lg mt-8 bg-red-600 bg-opacity-20 hover:bg-opacity-30"><i
                        class="fas fa-sign-out-alt text-lg w-6"></i><span class="menu-text">Logout</span></a>
            </nav>
            <div class="absolute bottom-6 left-0 w-full px-6">
                <div
                    class="flex items-center space-x-3 bg-white bg-opacity-10 p-3 rounded-lg backdrop-blur-sm border border-white border-opacity-10">
                    <span class="text-xs text-blue-200">Generated by</span>
                    <img src="footer-logo.png" alt="Logo" class="h-10 object-contain">
                </div>
            </div>
        </div>
    </aside>

    <div id="mainContent" class="ml-64 transition-all duration-300">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="flex items-center justify-between px-6 py-4">
                <div class="flex items-center space-x-4">
                    <button id="toggleSidebar" class="text-gray-600 focus:outline-none"><i
                            class="fas fa-bars text-xl"></i></button>
                    <h1 class="text-2xl font-bold gradient-text">Users Management</h1>
                </div>
            </div>
        </header>

        <main class="p-6">
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 space-y-4 md:space-y-0">
                    <div class="flex items-center space-x-3">
                        <div class="p-3 bg-blue-100 rounded-lg"><i class="fas fa-users text-blue-600 text-2xl"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800">User Management</h2>
                            <p class="text-gray-600 text-sm">Local database users</p>
                        </div>
                    </div>
                </div>

                <!-- Search Section -->
                <div class="mb-6 flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4">
                    <div class="relative flex-grow">
                        <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="userSearch" placeholder="Search by username..."
                            class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    </div>
                    <button onclick="performUserSearch()"
                        class="px-8 py-3 bg-blue-600 text-white rounded-xl shadow-md hover:bg-blue-700 transition-all font-bold">
                        Search
                    </button>
                    <button onclick="openModal()"
                        class="px-6 py-3 bg-gradient-to-r from-green-500 to-green-600 text-white rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center font-bold">
                        <i class="fas fa-plus mr-2"></i>Add User
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs text-gray-500 uppercase">ID</th>
                                <th class="px-6 py-3 text-left text-xs text-gray-500 uppercase">Username</th>
                                <th class="px-6 py-3 text-left text-xs text-gray-500 uppercase">Role</th>
                                <th class="px-6 py-3 text-left text-xs text-gray-500 uppercase">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="userModal" class="hidden fixed inset-0 z-50 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full">
            <h3 id="modalTitle" class="text-xl font-bold mb-4">Add User</h3>
            <form id="userForm" class="space-y-4">
                <input type="hidden" id="userId">
                <input type="text" id="username" placeholder="Username" required class="w-full p-3 border rounded-lg">
                <input type="text" id="full_name" placeholder="Full Name" required class="w-full p-3 border rounded-lg">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-lg">
                <select id="role" required class="w-full p-3 border rounded-lg">
                    <option value="admin">Admin</option>
                    <option value="staff" selected>Staff</option>
                </select>
                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-lg">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        let allUsers = [];
        checkAuth().then(() => loadUsers());

        async function loadUsers() {
            const res = await apiRequest('users?action=list');
            if (res.success) {
                allUsers = res.data;
                displayUsers(allUsers);
            }
        }

        function displayUsers(users) {
            document.getElementById('usersTableBody').innerHTML = users.map(u => `
                <tr class="hover:bg-gray-50 transition-all">
                    <td class="px-6 py-4 text-sm text-gray-500">#${u.id}</td>
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(u.username)}&background=random" class="w-8 h-8 rounded-full mr-3">
                            <span class="font-bold text-gray-800">${u.username}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4"><span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs uppercase font-bold">${u.role}</span></td>
                    <td class="px-6 py-4">
                        <button onclick="editUser(${u.id})" class="text-blue-600 hover:text-blue-800 mr-3 px-3 py-1 rounded-lg hover:bg-blue-50 transition-all font-medium border border-blue-200"><i class="fas fa-edit mr-1"></i>Edit</button>
                        <button onclick="deleteUser(${u.id})" class="text-red-600 hover:text-red-800 px-3 py-1 rounded-lg hover:bg-red-50 transition-all font-medium border border-red-200"><i class="fas fa-trash mr-1"></i>Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('userSearch').addEventListener('input', (e) => {
            performUserSearch();
        });

        function performUserSearch() {
            const query = document.getElementById('userSearch').value.toLowerCase().trim();
            const filtered = allUsers.filter(u => u.username.toLowerCase().includes(query));
            displayUsers(filtered);
        }

        function openModal() { document.getElementById('userForm').reset(); document.getElementById('userId').value = ''; document.getElementById('modalTitle').textContent = 'Add User'; document.getElementById('userModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('userModal').classList.add('hidden'); }
        async function editUser(id) {
            const res = await apiRequest(`users?action=get&id=${id}`);
            if (res.success) {
                const u = res.data;
                document.getElementById('modalTitle').textContent = 'Edit User';
                document.getElementById('userId').value = u.id;
                document.getElementById('username').value = u.username;
                document.getElementById('full_name').value = u.full_name;
                document.getElementById('role').value = u.role;
                document.getElementById('userModal').classList.remove('hidden');
            }
        }
        async function deleteUser(id) { if (confirm('Are you sure you want to delete this user?')) { await apiRequest(`users?action=delete&id=${id}`, 'POST'); loadUsers(); } }
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const data = { username: document.getElementById('username').value, full_name: document.getElementById('full_name').value, role: document.getElementById('role').value };
            if (document.getElementById('password').value) data.password = document.getElementById('password').value;
            if (id) data.id = id;
            await apiRequest(`users?action=${id ? 'update' : 'create'}`, 'POST', data);
            closeModal(); loadUsers();
        });
    </script>

</body>

</html>
